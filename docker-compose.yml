  #   restart: always
  #   ports:
  #     - "${FRONTEND_PORT_HOST}:${FRONTEND_PORT_CONTAINER}"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - backend
  #   networks:
